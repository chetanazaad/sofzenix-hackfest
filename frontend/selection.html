<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sofzenix HackFest 2026 — Master the Future</title>
  <meta name="description" content="Join India's biggest Agentic AI Hackathon. Build, innovate, and win prizes worth ₹4,00,000+.">
  
  <!-- GSAP & ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  
  <!-- tsParticles -->
  <script src="https://cdn.jsdelivr.net/npm/@tsparticles/engine@3.0.3/tsparticles.engine.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tsparticles/basic@3.0.3/tsparticles.basic.min.js"></script>
  
  <!-- TypewriterJS -->
  <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>

  <link rel="stylesheet" href="css/main.css">
  <style>
    /* Base Variables & Reset Overrides */
    :root {
      --neon-cyan: #00f5ff;
      --neon-purple: #b538ff;
      --neon-yellow: #ffdf00;
      --glass-bg: rgba(20, 20, 25, 0.6);
      --glass-border: rgba(0, 245, 255, 0.2);
    }
    
    body {
      background-color: #050508;
      overflow-x: hidden;
    }

    /* tsParticles Background */
    #tsparticles {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
    }

    /* Glassmorphism Classes */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 32px 0 rgba(0, 245, 255, 0.1);
      position: relative;
      overflow: hidden;
      transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
    }
    
    .glass-card::before {
      content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: skewX(-20deg); transition: 0.5s;
    }
    
    .glass-card:hover::before {
      left: 150%;
    }

    .glass-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 40px 0 rgba(0, 245, 255, 0.2);
      border-color: rgba(0, 245, 255, 0.5);
    }

    /* Hero Section */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 120px 20px 60px; position: relative;
    }

    .hero-glow {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(181, 56, 255, 0.15) 0%, rgba(0, 245, 255, 0.1) 40%, transparent 70%);
      pointer-events: none; z-index: -1;
      animation: pulse-glow 8s ease-in-out infinite alternate;
    }

    @keyframes pulse-glow {
      0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }

    .hero h1 {
      font-size: clamp(3rem, 10vw, 7rem); font-family: var(--font-mono); font-weight: 800;
      color: #fff; text-transform: uppercase; letter-spacing: -0.02em;
      line-height: 0.9; margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
    }
    
    .typewriter-text {
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-family: var(--font-mono);
      color: var(--neon-cyan);
      height: 40px; margin-bottom: 30px;
    }

    /* Glowing CTA Button */
    .cta-button {
      position: relative;
      display: inline-block;
      padding: 16px 40px;
      font-family: var(--font-mono);
      font-size: 1.2rem; font-weight: 700;
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      background: linear-gradient(90deg, #00f5ff, #b538ff);
      border: none; border-radius: 50px;
      z-index: 1;
      overflow: hidden;
      transition: transform 0.3s ease;
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
    }

    .cta-button::before {
      content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px;
      background: #050508; border-radius: 48px; z-index: -1;
      transition: background 0.3s ease;
    }

    .cta-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(181, 56, 255, 0.6);
    }
    
    .cta-button:hover::before {
      background: transparent;
    }

    /* Timeline Section */
    .timeline {
      padding: 100px 20px;
      max-width: 1000px; margin: 0 auto;
      position: relative;
    }
    
    .timeline::before {
      content: ''; position: absolute; left: 50%; top: 100px; bottom: 100px;
      width: 2px; background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-purple));
      transform: translateX(-50%);
    }

    .timeline-item {
      display: flex; justify-content: flex-end; padding-right: 50%; position: relative;
      margin-bottom: 60px;
    }
    
    .timeline-item:nth-child(even) {
      justify-content: flex-start; padding-right: 0; padding-left: 50%;
    }

    .timeline-content {
      width: 80%; padding: 24px;
    }

    .timeline-dot {
      position: absolute; right: -10px; top: 30px; width: 20px; height: 20px;
      background: var(--neon-cyan); border-radius: 50%;
      box-shadow: 0 0 15px var(--neon-cyan);
    }

    .timeline-item:nth-child(even) .timeline-dot {
      right: auto; left: -10px; background: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple);
    }

    /* Interactive Terminal */
    .terminal-container {
      max-width: 800px; margin: 100px auto;
      background: #0d0d12;
      border: 1px solid #333;
      border-radius: 12px;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }
    
    .terminal-header {
      background: #1a1a24; padding: 10px 16px; display: flex; gap: 8px; border-bottom: 1px solid #333;
    }
    .term-btn { width: 12px; height: 12px; border-radius: 50%; }
    .term-r { background: #ff5f56; } .term-y { background: #ffbd2e; } .term-g { background: #27c93f; }
    
    .terminal-body {
      padding: 24px; color: #a9b7c6; min-height: 250px;
    }
    
    .term-prompt { color: var(--neon-cyan); margin-right: 8px; font-weight: bold; }
    .term-response { color: #fff; margin-bottom: 12px; display: block; }
    .term-p { margin-bottom: 8px; }
    
    /* Countdown overrides */
    #countdown {
      display: flex; gap: 24px; margin-bottom: 50px;
    }
    .timer-box {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      padding: 16px 20px; border-radius: 12px;
      display: flex; flex-direction: column; align-items: center;
      min-width: 90px;
    }
    .stat-val { font-family: var(--font-mono); font-size: 2.5rem; color: #fff; font-weight: bold; text-shadow: 0 0 10px var(--neon-cyan); display: block; }

    @media (max-width: 768px) {
      .timeline::before { left: 30px; }
      .timeline-item { justify-content: flex-start; padding-right: 0; padding-left: 60px; }
      .timeline-item:nth-child(even) { padding-left: 60px; }
      .timeline-content { width: 100%; }
      .timeline-dot, .timeline-item:nth-child(even) .timeline-dot { left: 20px; right: auto; }
      .hero h1 { font-size: 3.5rem; }
      #countdown { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- tsParticles Background -->
  <div id="tsparticles"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">⚡ Skil<span>Station</span></a>

      <a href="about.html">About Us</a>

    </div>

  <!-- Mobile Nav -->
  <div class="overlay" id="overlay" onclick="toggleMobileNav()"></div>
  <div class="mobile-nav" id="mobileNav">
    <button class="mobile-nav-close" onclick="toggleMobileNav()">✕</button>
    <a href="about.html">About Us</a>
    <a href="prizes.html">Prizes</a>
    <a href="selection.html">Selection</a>
    <a href="guidelines.html">Guidelines</a>
    <a href="login.html">Login</a>
    <a href="register.html" style="color:var(--neon-cyan);">Register</a>

  <div style="padding-top: 100px;"></div>

  <!-- Selection Process Section -->
  <section class="gsap-fade" id="selection" style="padding: 100px 20px; max-width: 1200px; margin: 0 auto;">
    <h2 style="text-align:center; font-family:var(--font-mono); color:#fff; margin-bottom:50px;">// SELECTION_PROCESS</h2>
    <div style="display: flex; gap: 40px; flex-wrap: wrap;">
      <!-- Sidebar Tabs -->
      <div style="flex: 1; min-width: 280px; max-width: 100%;">
        <div class="glass-card" style="padding: 10px; border-radius: 12px; display: flex; flex-direction: column; gap: 5px;" id="tabs-container">
          <!-- Tabs injected via JS -->
        </div>
      </div>

      <!-- Main Content Area -->
      <div style="flex: 2; min-width: 280px; max-width: 100%;">
        <div class="glass-card" style="padding: 40px 20px; height: 100%; border: 1px solid var(--neon-cyan); transition: opacity 0.3s ease; overflow: hidden;" id="tab-content">
           <!-- Dynamic content injected via JS -->
        </div>
      </div>
    </div>

    <!-- Script for Tab Switching -->
    <script>
      const selectionTabs = [
        {
          id: '01',
          name: 'PROBLEM IDENTIFICATION',
          title: 'PROBLEM<br>IDENTIFICATION',
          icon: '💡',
          desc: 'PARTICIPANTS IDENTIFY A REAL-WORLD PROBLEM THAT CAN BE SOLVED USING AUTONOMOUS AI AGENTS. THE PROBLEM SHOULD REQUIRE MULTI-STEP REASONING, DECISION MAKING, AND INTERACTION WITH EXTERNAL TOOLS.',
          boxes: [
            { t: 'REAL-WORLD PROBLEM' },
            { t: 'MULTI-STEP WORKFLOW' },
            { t: 'AGENTIC APPROACH' }
          ]
        },
        {
          id: '02',
          name: 'PROPOSED SOLUTION',
          title: 'PROPOSED<br>SOLUTION',
          icon: '🗂️',
          desc: 'TEAMS SUBMIT A 8-SLIDE PDF DESCRIBING THEIR PROPOSED AGENT SYSTEM, INCLUDING AGENT ROLES, TOOL INTEGRATIONS, MEMORY STRATEGY, AND FAILURE HANDLING MECHANISMS.',
          boxes: [
            { t: 'AGENT ARCHITECTURE' },
            { t: 'MEMORY & TOOLING' },
            { t: 'SYSTEM DESIGN' }
          ]
        },
        {
          id: '03',
          name: 'TEAM SELECTION',
          title: 'TEAM<br>SELECTION',
          icon: '🔽',
          desc: 'SUBMISSIONS ARE EVALUATED BASED ON AGENT AUTONOMY, TECHNICAL FEASIBILITY, REAL-WORLD IMPACT, AND SCALABILITY. TOP 100 SELECTED TEAMS WILL BE INVITED FOR OFFLINE HACKATHON.',
          boxes: [
            { t: 'AGENT AUTONOMY' },
            { t: 'TECHNICAL DEPTH' },
            { t: 'SCALABLE DESIGN' }
          ]
        },
        {
          id: '04',
          name: 'OFFLINE HACKATHON',
          title: 'OFFLINE<br>HACKATHON',
          icon: '⚡',
          desc: 'SHORTLISTED TEAMS PARTICIPATE IN THE 36-HOUR OFFLINE HACKATHON WHERE THEY TRANSFORM THEIR IDEA INTO A WORKING PROTOTYPE OF AN AUTONOMOUS AGENT SYSTEM.',
          boxes: [
            { t: '36-HOUR BUILD' },
            { t: 'LIVE DEVELOPMENT' },
            { t: 'MENTOR SUPPORT' }
          ]
        },
        {
          id: '05',
          name: 'FINAL DEMONSTRATION',
          title: 'FINAL<br>DEMONSTRATION',
          icon: '🏆',
          desc: 'TEAMS PRESENT THEIR WORKING SOLUTION TO JUDGES. PROJECTS MUST DEMONSTRATE AUTONOMOUS TASK EXECUTION, TOOL USAGE, AND A COMPLETE END-TO-END WORKFLOW.',
          boxes: [
            { t: 'LIVE DEMO' },
            { t: 'AGENT WORKFLOW' },
            { t: 'REAL EXECUTION' }
          ]
        }
      ];

      const tabsContainer = document.getElementById('tabs-container');
      const tabContent = document.getElementById('tab-content');

      function renderTabContent(index) {
        const data = selectionTabs[index];
        tabContent.style.opacity = 0;
        
        setTimeout(() => {
          let boxesHtml = '';
          data.boxes.forEach(b => {
            boxesHtml += `
              <div style="background: rgba(255,255,255,0.03); padding: 18px 16px; border: 1px solid rgba(255,255,255,0.08); text-align: left;">
                <h5 style="color:#fff; margin: 0; font-family:var(--font-mono); font-size: 0.85rem; letter-spacing: 0.05em;">${b.t}</h5>
              </div>
            `;
          });
          
          tabContent.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap: wrap; gap: 10px;">
              <h2 style="color:#fff; font-size: clamp(1.8rem, 5vw, 2.6rem); line-height: 1.1; margin-bottom:20px; word-break: break-word; font-family: var(--font-mono); text-transform: uppercase;">${data.title}</h2>
              <div style="background: rgba(0,245,255,0.1); border: 1px solid rgba(0,245,255,0.3); padding: 10px 14px; border-radius: 8px; font-size: 1.5rem; flex-shrink: 0;">${data.icon}</div>
            </div>
            <p style="color:var(--text-muted); line-height: 1.9; margin-bottom: 30px; border-left: 2px solid var(--neon-cyan); padding-left: 15px; font-size: 0.9rem; word-break: break-word; letter-spacing: 0.03em; text-transform: uppercase; font-family: var(--font-mono);">
              ${data.desc}
            </p>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px;">
              ${boxesHtml}
            </div>
          `;
          tabContent.style.opacity = 1;

          // Update tabs visuals
          Array.from(tabsContainer.children).forEach((child, i) => {
            if (i === index) {
              child.style.borderLeft = '4px solid var(--neon-cyan)';
              child.style.background = 'rgba(0,245,255,0.05)';
              child.style.opacity = '1';
              child.querySelector('span').style.color = 'var(--neon-cyan)';
            } else {
              child.style.borderLeft = '4px solid transparent';
              child.style.background = 'transparent';
              child.style.opacity = '0.4';
              child.querySelector('span').style.color = '#fff';
            }
          });
        }, 150); // fast transition
      }

      selectionTabs.forEach((tab, index) => {
        const div = document.createElement('div');
        div.style.padding = '20px';
        div.style.borderLeft = '4px solid transparent';
        div.style.opacity = '0.4';
        div.style.cursor = 'pointer';
        div.style.transition = 'all 0.3s ease';
        
        div.innerHTML = `
          <span style="font-family:var(--font-mono); color:#fff; opacity:0.6; font-size: 1.2rem; display:block; margin-bottom:5px;">${tab.id}</span>
          <h4 style="color:#fff; margin:0; font-family:var(--font-mono); font-size:1rem;">${tab.name}</h4>
        `;
        
        // hover support
        div.addEventListener('mouseenter', () => renderTabContent(index));
        div.addEventListener('click', () => renderTabContent(index));
        
        tabsContainer.appendChild(div);
      });

      // Init first tab
      renderTabContent(0);
    </script>
  </section>

  <footer class="site-footer" style="margin-top: 50px;">
    Copyright &copy; 2026 <b>Sofzenix IT Solution LLP</b>
  </footer>

  <script src="js/app.js"></script>
  
  <!-- Animation Scripts -->
  <script>
    // 1. Initialize tsParticles
    (async () => {
      await loadBasic(tsParticles);
      await tsParticles.load({
        id: "tsparticles",
        options: {
          background: { color: { value: "transparent" } },
          fpsLimit: 60,
          interactivity: {
            events: { onHover: { enable: true, mode: "repulse" } },
            modes: { repulse: { distance: 100, duration: 0.4 } }
          },
          particles: {
            color: { value: ["#00f5ff", "#b538ff", "#ffffff"] },
            links: { color: "rgba(0, 245, 255, 0.2)", distance: 150, enable: true, opacity: 0.5, width: 1 },
            move: { enable: true, speed: 1.5, direction: "none", random: false, straight: false, outModes: "out" },
            number: { density: { enable: true }, value: 80 },
            opacity: { value: 0.5 },
            shape: { type: "circle" },
            size: { value: { min: 1, max: 3 } }
          },
          detectRetina: true
        }
      });
    })();

    // 2. Initialize TypewriterJS
    new Typewriter('#typewriter', {
      strings: [
        '> Initializing HackFest Core...',
        '> Connecting Innovators...',
        '> Build. Compete. Win.'
      ],
      autoStart: true,
      loop: true,
      delay: 50,
      deleteSpeed: 30
    });

    // 3. Initialize GSAP ScrollTrigger
    gsap.registerPlugin(ScrollTrigger);

    // Hero entrance animation
    gsap.from(".gsap-hero", {
      y: 50,
      opacity: 0,
      duration: 1,
      stagger: 0.2,
      ease: "power3.out",
      delay: 0.2
    });

    // Standard fade up for sections
    gsap.utils.toArray(".gsap-fade").forEach(section => {
      gsap.from(section, {
        scrollTrigger: {
          trigger: section,
          start: "top 80%",
          toggleActions: "play none none reverse"
        },
        y: 40, opacity: 0, duration: 0.8, ease: "power2.out"
      });
    });

    // Staggered cards
    gsap.from(".gsap-card", {
      scrollTrigger: {
        trigger: ".features",
        start: "top 75%",
      },
      y: 50, opacity: 0, duration: 0.8, stagger: 0.2, ease: "back.out(1.7)"
    });

    // Timeline staggered slide-in
    gsap.utils.toArray(".gsap-timeline").forEach((item, index) => {
      let xDir = index % 2 === 0 ? -50 : 50; // Slide from left for odd, right for even
      gsap.from(item, {
        scrollTrigger: {
          trigger: item,
          start: "top 85%",
        },
        x: xDir, opacity: 0, duration: 0.8, ease: "power3.out"
      });
    });

    // 4. Countdown Logic
    function updateCountdown() {
      const targetDate = new Date("April 26, 2026 23:59:59").getTime();
      const now = new Date().getTime();
      const difference = targetDate - now;

      if (difference <= 0) {
        document.getElementById('countdown').innerHTML = "<h2 style='color:var(--neon-cyan)'>🔥🔥 HACKATHON REGISTRATION CLOSED 🔥🔥</h2>";
        return;
      }

      const d = Math.floor(difference / (1000 * 60 * 60 * 24));
      const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((difference % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = d.toString().padStart(2, '0');
      document.getElementById('hours').textContent = h.toString().padStart(2, '0');
      document.getElementById('minutes').textContent = m.toString().padStart(2, '0');
      document.getElementById('seconds').textContent = s.toString().padStart(2, '0');
    }
    
    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
