<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evaluator Login — Sofzenix HackFest</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#050505; }
    .login-box { background:var(--bg-surface); border:1px solid var(--bg-border); border-radius:16px;
                 padding:40px; width:90%; max-width:420px; }
    .login-logo { font-family:var(--font-mono); font-size:1.1rem; color:var(--accent-yellow);
                  margin-bottom:8px; }
    .login-title { font-size:1.8rem; font-family:var(--font-mono); color:#fff; margin-bottom:6px; }
    .login-sub { color:var(--text-muted); font-size:0.85rem; margin-bottom:28px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">⚖️ EVALUATOR PORTAL</div>
    <h1 class="login-title">Sign In</h1>
    <p class="login-sub">Enter your evaluator credentials to access the judging dashboard.</p>

    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Login ID</label>
        <input type="text" id="loginId" placeholder="e.g. eval01" required autocomplete="username">
      </div>
      <div class="form-group" style="margin-top:14px;">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div id="errorMsg" style="color:#ff5050; font-size:13px; margin-top:10px; display:none;"></div>
      <button class="btn btn-solid w-full" type="submit"
              style="background:var(--accent-yellow);color:#000;margin-top:20px;font-family:var(--font-mono);"
              id="loginBtn">// LOGIN</button>
    </form>

    <p style="text-align:center; margin-top:20px; font-size:12px; color:var(--text-muted);">
      Not an evaluator? <a href="login.html" style="color:var(--neon-cyan);">Participant login →</a>
    </p>
  </div>

  <div id="toast"></div>
  <script src="js/config.js"></script>
  <script>
    const API = CONFIG.API_URL;

    // Redirect if already logged in
    (async () => {
      try {
        const r = await fetch(API + '/api/evaluator/me', { credentials: 'include' });
        const d = await r.json();
        if (d.logged_in) window.location.href = 'evaluator.html';
      } catch(e) {}
    })();

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      btn.textContent = '// Logging in...';
      btn.disabled = true;
      errEl.style.display = 'none';

      try {
        const r = await fetch(API + '/api/evaluator/login', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            login_id: document.getElementById('loginId').value.trim(),
            password: document.getElementById('password').value,
          })
        });
        const d = await r.json();
        if (d.success) {
          window.location.href = 'evaluator.html';
        } else {
          errEl.textContent = d.error || 'Invalid credentials';
          errEl.style.display = 'block';
        }
      } catch(err) {
        errEl.textContent = 'Connection error. Try again.';
        errEl.style.display = 'block';
      }
      btn.textContent = '// LOGIN';
      btn.disabled = false;
    }
  </script>
</body>
</html>
