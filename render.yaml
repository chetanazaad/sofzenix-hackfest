services:
  # ─── UNIFIED WEB SERVICE (Frontend + Backend) ────────────────────────────────
  - type: web
    name: sofzenix-hackfest-unified
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn app:app"
    envVars:
      - key: FLASK_APP
        value: app.py
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DB_HOST
        value: gateway01.ap-southeast-1.prod.aws.tidbcloud.com
      - key: DB_USER
        value: 3oB7SH7sLkwM5pY.root
      - key: DB_PASSWORD
        value: dJy9dADqnrhLC83M
      - key: DB_NAME
        value: test
      - key: DB_PORT
        value: 4000
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: SESSION_COOKIE_SAMESITE
        value: "None"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: SECRET_KEY
        value: "sofzenix-hackfest-unified-2026"
