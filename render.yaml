services:
  # ─── FRONTEND (Static Site) ──────────────────────────────────────────────────
  - type: static
    name: sofzenix-hackfest-ui
    env: static
    buildCommand: "echo 'No build command needed'"
    publishPath: frontend
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ─── BACKEND (Flask Web Service) ─────────────────────────────────────────────
  - type: web
    name: sofzenix-hackfest-api
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn app:app"
    envVars:
      - key: FLASK_APP
        value: app.py
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DB_HOST
        value: YOUR_TIDB_HOST_HERE
      - key: DB_USER
        value: YOUR_TIDB_USER_HERE
      - key: DB_PASSWORD
        value: YOUR_TIDB_PASS_HERE
      - key: DB_NAME
        value: sofzenix_hackfest
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: SESSION_COOKIE_SAMESITE
        value: "None"
      - key: SESSION_COOKIE_SECURE
        value: "True"
