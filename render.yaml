services:
  - type: web
    name: sofzenix-hackfest
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: Admin@2026
      - key: DEV_MODE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: sofzenix-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: sofzenix-db
    plan: free
    databaseName: sofzenix_hackfest
    user: sofzenix_admin
